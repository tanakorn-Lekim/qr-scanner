<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STORE APP</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app-shell">

    <section id="mainMenu" class="page active">
      <h1>STORE APP</h1>

      <section class="menu-grid">
        <button class="menu-card transfer" onclick="openTransfer()">
          <strong>TRANSFER</strong>
          <span>โอนงานไปแผนกถัดไป</span>
        </button>

        <button class="menu-card receive" onclick="openReceive()">
          <strong>RECEIVE</strong>
          <span>รับงานจากรายการที่โอนมา</span>
        </button>
      </section>
    </section>

    <section id="transferPage" class="page">
      <button class="ghost" onclick="backToMenu()">BACK</button>
      <h1>TRANSFER</h1>

      <section class="panel">
        <h2>QR Scanner</h2>
        <div id="reader"></div>
        <button id="cameraBtn" class="primary" onclick="startScanner()">เปิดกล้อง</button>
        <p id="cameraStatus" class="muted">เลือกเมนูแล้วเปิดกล้องเพื่อสแกน</p>
      </section>

      <section class="panel">
        <label for="transferTagId">TAG ID</label>
        <input id="transferTagId" type="text" placeholder="Scan หรือกรอก TAG ID" onkeydown="handleTransferEnter(event)">
        <button class="primary" onclick="scanTransfer()">SCAN</button>
      </section>

      <section id="transferInfoBox" class="panel hidden">
        <h2 id="transferShowTagId"></h2>

        <div class="info-row"><span>PART</span><strong id="transferPart"></strong></div>
        <div class="info-row"><span>BALANCE / ORIGINAL</span><strong id="transferQtyShow"></strong></div>
        <div class="info-row"><span>LOCATION</span><strong id="transferLocation"></strong></div>
        <div class="info-row"><span>STATUS</span><strong id="transferStatus"></strong></div>

        <label for="transferQty">TRANSFER QTY</label>
        <input id="transferQty" type="number" min="1" placeholder="จำนวนโอน">

        <label for="transferTo">TO</label>
        <select id="transferTo">
          <option value="FN">FN</option>
          <option value="SB">SB</option>
          <option value="MC">MC</option>
          <option value="FINAL">FINAL</option>
        </select>

        <label for="transferBy">TRANSFER BY</label>
        <input id="transferBy" type="text" placeholder="ชื่อคนโอน">

        <button class="warning" onclick="confirmTransferClick()">CONFIRM TRANSFER</button>
      </section>
    </section>

    <section id="receivePage" class="page">
      <button class="ghost" onclick="backToMenu()">BACK</button>
      <h1>RECEIVE</h1>

      <section class="panel">
        <h2>QR Scanner</h2>
        <div id="receiveReader"></div>
        <button id="receiveCameraBtn" class="primary" onclick="startScanner()">เปิดกล้อง</button>
        <p id="receiveCameraStatus" class="muted">เลือกเมนูแล้วเปิดกล้องเพื่อสแกน</p>
      </section>

      <section class="panel">
        <label for="receiveTagId">TAG ID</label>
        <input id="receiveTagId" type="text" placeholder="Scan หรือกรอก TAG ID" onkeydown="handleReceiveEnter(event)">
        <button class="primary" onclick="scanReceive()">SCAN</button>
      </section>

      <section id="pendingBox" class="panel hidden">
        <h2>PENDING TRANSFER</h2>
        <div id="pendingList"></div>

        <label for="receiveBy">RECEIVE BY</label>
        <input id="receiveBy" type="text" placeholder="ชื่อคนรับ">

        <button class="success" onclick="confirmReceiveClick()">CONFIRM RECEIVE</button>
      </section>
    </section>

    <section id="messageBox" class="message hidden"></section>

  </main>

  <script src="app.js"></script>
</body>
</html>
